<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Review</title>
 <meta name="description" content="Submit and share your experience with products using this interactive review form, including ratings, features, and detailed feedback.">
<meta name="author" content="Nicole Makayi">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<!-- CSS Files -->
<link rel="stylesheet" href="styles/review.css">
<script src="scripts/getdates.js" defer></script>

<!-- JavaScript -->
<script src="scripts/review.js" defer></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>
  <form method="get" action="review.html">

    <!-- Product -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- Rating -->
    <fieldset>
      <legend>Overall Rating</legend>

      <label><input type="radio" name="rating" value="1" required> ☆</label>
      <label><input type="radio" name="rating" value="2"> ☆☆</label>
      <label><input type="radio" name="rating" value="3"> ☆☆☆</label>
      <label><input type="radio" name="rating" value="4"> ☆☆☆☆</label>
      <label><input type="radio" name="rating" value="5"> ☆☆☆☆☆</label>

    </fieldset>

    <!-- Date -->
    <label for="installDate">Date of Installation</label>
    <input type="date" id="installDate" name="installDate" required>

    <!-- Features -->
    <fieldset>
      <legend>Useful Features (Check all that apply)</legend>

      <label><input type="checkbox" name="features" value="durability"> Durability</label>
      <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>
      <label><input type="checkbox" name="features" value="performance"> Performance</label>
      <label><input type="checkbox" name="features" value="design"> Design</label>

    </fieldset>

    <!-- Review -->
    <label for="review">Written Review (Optional)</label>
    <textarea id="review" name="review"></textarea>

    <!-- Name -->
    <label for="username">Your Name (Optional)</label>
    <input type="text" id="username" name="username">

    <!-- Submit -->
    <input type="submit" value="Post Review">

  </form>
</main>

<footer>
  <p>&copy; <span id="currentyear"></span> 💥 Nicole Makayi💥 Zimbabwe</p>
  <p id="lastModified"></p>
</footer>


</body>
</html>
